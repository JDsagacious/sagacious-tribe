<!DOCTYPE html>
<html>
<head>
  <title>Sagacious Tribe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

 <link rel="stylesheet" href="css/styles.css">
  
  <script src="js/app.js" defer></script>
</head>

<body>

<!-- USER -->
<div class="user-bar">

  <span id="user">
    Not logged in
  </span>

  <button
      id="logout-btn"
      onclick="logout()"
      style="display:none;margin-left:10px;"
  >
      🚪 Logout
  </button>

</div>

<!-- HEADER -->
<div class="header">
  <h1>🌐 Sagacious Tribe</h1>
  <p>Social • Marketplace • Eco • Security</p>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showModule('tribe')">💬 Tribe Talk</button>
  <button onclick="showModule('ecosaga')">🎧 EcoSaga</button>
  <button onclick="showModule('afrispice')">🛒 Afrispice</button>
  <button onclick="showModule('cyber')">🛡️ CyberGuardians</button>
</div>

<!-- LOGIN -->
<div class="center">

  <button
    id="login-btn"
    onclick="loginWithPi()"
  >
    Login with Pi
  </button>

</div>

<!-- MODULES -->

<div id="tribe" class="module">
  <h2>💬 Tribe Talk</h2>

  <!-- ROOM SELECT -->
  <select id="room" onchange="loadMessages()">
    <option value="global">🌍 Global</option>
    <option value="artists">🎤 Artists</option>
    <option value="fans">❤️ Fans</option>
  </select>

  <!-- MESSAGE INPUT -->
  <div class="card">
    <textarea id="message-input" placeholder="Type message..."></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>

<div class="card">
  <h3>Create Group</h3>
  <input type="text" id="group-name" placeholder="Group name">
  <button onclick="createGroup()">Create</button>
</div>

<div class="card">
  <h3>Available Groups</h3>
  <div id="group-list"></div>
</div>
  
  <!-- CHAT DISPLAY -->
  <div id="chat-box"></div>

  <!-- CREATE POST -->
  <div class="card">
  <textarea id="post-content" placeholder="What's on your mind?"></textarea>

<input type="file" id="post-image">

<button onclick="addPost()">Post</button>

  <!-- POSTS DISPLAY -->
  <div id="post-list"></div>
</div>

<div id="ecosaga" class="module">
  <h2>🎧 EcoSaga Studio</h2>
  <p>Music production, eco-awareness, and studio directory (Coming Soon)</p>
</div>

<div id="afrispice" class="module">
  <h2>🛒 Afrispice Marketplace</h2>

  <div class="card">
    <input type="text" placeholder="Product Name">
    <input type="text" placeholder="Price in Pi">
    <button onclick="addProduct(); console.log('clicked')">List Product</button>
  </div>

  <div id="product-list"></div>
</div>

<div id="cyber" class="module">
  <h2>🛡️ CyberGuardians/HSE</h2>

  <div class="card">
    <input type="text" placeholder="Report Title">
    <textarea placeholder="Describe issue"></textarea>
    <button onclick="addReport()">Submit</button>
  </div>

  <div id="report-list"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  <a href="pages/terms.html">Terms</a> |
  <a href="pages/privacy.html">Privacy</a>
  <p>Powered by Pi Network</p>
</div>

<!-- JS -->

</body>
</html>
