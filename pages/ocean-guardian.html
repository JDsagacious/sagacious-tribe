<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ocean Guardian</title>

<link rel="stylesheet" href="../css/styles.css">
<link rel="stylesheet" href="../css/ocean-guardian.css">

</head>

<body>

<div class="game-container">

    <header class="game-header">

        <h1>🌊 Ocean Guardian</h1>

        <p>
            Clean the ocean.
            Save marine life.
            Protect our future.
        </p>

    </header>

<section class="score-board">

    <div class="score-box">
        ⭐ Eco Points
        <h2 id="score">0</h2>
    </div>

    <div class="score-box">
        ⏱ Time
        <h2 id="timer">60</h2>
    </div>

</section>

<section id="ocean">

    <div id="bubbleLayer"></div>

    <div id="fishLayer">

        <img
            id="fish1"
            class="fish"
            src="images/ocean-guardian/fish/fish-1.png"
            alt="Swimming Fish">

    </div>

    <div id="trashLayer"></div>

    <div id="effectsLayer"></div>

</section>

        <button id="startBtn">
    ▶ Start Mission
</button>

    </div>

    <div class="footer">

        <a href="../index.html">
            ⬅ Back to EcoGames
        </a>

    </div>

</div>

<script src="../js/ocean-guardian.js"></script>

</body>
</html>
