<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ocean Guardian</title>

<link rel="stylesheet" href="../css/styles.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(#5ec8ff,#0077be);
    color:white;
    text-align:center;
}

.game-header{
    padding:25px;
}

.game-header h1{
    margin-bottom:10px;
}

#game-area{

    width:100%;
    height:70vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(#7ed8ff,#0288d1);

}

.game-card{

    background:white;
    color:#0f172a;

    width:85%;
    max-width:700px;

    padding:30px;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,.25);

}

.game-card h2{

    color:#0077be;

}

button{

    margin-top:20px;

    padding:12px 24px;

    font-size:18px;

    border:none;

    border-radius:12px;

    background:#2ecc71;

    color:white;

    cursor:pointer;

}

button:hover{

    background:#27ae60;

}

</style>

</head>

<body>

<div class="game-header">

<h1>🌊 Ocean Guardian</h1>

<p>

Protect the oceans.

Clean pollution.

Save marine life.

</p>

</div>

<div id="game-area">

<div class="game-card">

<h2>Mission 013</h2>

<p>

Collect floating trash.

Protect sea life.

Earn Eco Points.

</p>

<h3>

🚧 Prototype Coming Soon

</h3>

<button disabled>

Start Mission

</button>

</div>

</div>

<br>

<button onclick="history.back()">

⬅ Back to EcoGames

</button>

</body>
</html>
